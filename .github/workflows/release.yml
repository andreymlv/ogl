name: Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_SOURCE_DIR: ${{ github.workspace }}
  LLVM_VERSION: 20

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux
            artifact: ogl-linux-x64.tar.gz
          - os: windows-latest
            name: Windows
            artifact: ogl-windows-x64.zip

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    env:
      CCACHE_DIR: ${{ github.workspace }}/build/caches/ccache
      CCACHE_MAXSIZE: 500M

    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM apt repository (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /usr/share/keyrings/llvm-snapshot.gpg.key > /dev/null
          UBUNTU_RELEASE=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg.key] http://apt.llvm.org/${UBUNTU_RELEASE}/ llvm-toolchain-${UBUNTU_RELEASE}-${LLVM_VERSION} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-${LLVM_VERSION} clazy ninja-build pkg-config autoconf autoconf-archive automake libtool \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libwayland-egl-backend-dev wayland-protocols libxkbcommon-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgl1-mesa-dri mesa-utils xvfb \
            ccache mold

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm ccache --yes

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - uses: lukka/get-cmake@latest

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: build/caches/ccache
          key: ccache-${{ matrix.name }}-${{ github.run_id }}
          restore-keys: ccache-${{ matrix.name }}-

      - name: Restore vcpkg binary cache
        uses: actions/cache/restore@v4
        id: vcpkg-cache
        with:
          path: build/caches/vcpkg-binary-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'meta/vcpkg/**/*.cmake') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'meta/vcpkg/**/*.cmake') }}-
            vcpkg-${{ runner.os }}-

      - name: Bootstrap vcpkg
        run: python3 meta/build-vcpkg.py

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake --preset Distribution
          -DCMAKE_C_COMPILER=clang-${LLVM_VERSION}
          -DCMAKE_CXX_COMPILER=clang++-${LLVM_VERSION}
          -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake --preset Distribution

      - name: Build
        run: cmake --build --preset Distribution

      - name: Save vcpkg binary cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: build/caches/vcpkg-binary-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'meta/vcpkg/**/*.cmake') }}-${{ github.run_id }}

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: build/caches/ccache
          key: ccache-${{ matrix.name }}-${{ github.run_id }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ogl-linux-x64
          cp build/distribution/bin/pong ogl-linux-x64/
          cp build/distribution/bin/flappybird ogl-linux-x64/
          cp build/distribution/bin/example_01_window ogl-linux-x64/
          cp build/distribution/bin/example_02_triangle ogl-linux-x64/
          cp build/distribution/bin/example_03_texture ogl-linux-x64/
          tar -czf ogl-linux-x64.tar.gz ogl-linux-x64

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ogl-windows-x64
          Copy-Item build/distribution/bin/pong.exe ogl-windows-x64/
          Copy-Item build/distribution/bin/flappybird.exe ogl-windows-x64/
          Copy-Item build/distribution/bin/example_01_window.exe ogl-windows-x64/
          Copy-Item build/distribution/bin/example_02_triangle.exe ogl-windows-x64/
          Copy-Item build/distribution/bin/example_03_texture.exe ogl-windows-x64/
          Compress-Archive -Path ogl-windows-x64 -DestinationPath ogl-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-musl:
    name: Build (Linux musl)
    runs-on: ubuntu-latest
    container: alpine:3.21

    env:
      PROJECT_SOURCE_DIR: ${{ github.workspace }}
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      CCACHE_DIR: ${{ github.workspace }}/build/caches/ccache
      CCACHE_MAXSIZE: 500M

    steps:
      - name: Install system dependencies
        run: |
          apk add --no-cache \
            git clang clang-dev lld g++ musl-dev linux-headers \
            ninja make python3 py3-pip pkgconf curl zip unzip tar \
            autoconf autoconf-archive automake libtool \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            wayland-dev wayland-protocols-dev libxkbcommon-dev \
            mesa-dev perl bash ccache mold \
            libexecinfo-dev libexecinfo-static
          pip install --break-system-packages cmake

      - uses: actions/checkout@v6

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: build/caches/ccache
          key: ccache-musl-${{ github.run_id }}
          restore-keys: ccache-musl-

      - name: Restore vcpkg binary cache
        uses: actions/cache/restore@v4
        id: vcpkg-cache
        with:
          path: build/caches/vcpkg-binary-cache
          key: vcpkg-musl-${{ hashFiles('vcpkg.json', 'meta/vcpkg/**/*.cmake') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-musl-${{ hashFiles('vcpkg.json', 'meta/vcpkg/**/*.cmake') }}-
            vcpkg-musl-

      - name: Bootstrap vcpkg
        run: python3 meta/build-vcpkg.py

      - name: Configure
        run: >
          cmake --preset Distribution
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_MAKE_PROGRAM=/usr/bin/ninja
          -DCMAKE_EXE_LINKER_FLAGS="-static -static-libstdc++ -static-libgcc -fuse-ld=lld"
          -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build --preset Distribution

      - name: Save vcpkg binary cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: build/caches/vcpkg-binary-cache
          key: vcpkg-musl-${{ hashFiles('vcpkg.json', 'meta/vcpkg/**/*.cmake') }}-${{ github.run_id }}

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: build/caches/ccache
          key: ccache-musl-${{ github.run_id }}

      - name: Package
        run: |
          mkdir -p ogl-linux-musl-x64
          cp build/distribution/bin/pong ogl-linux-musl-x64/
          cp build/distribution/bin/flappybird ogl-linux-musl-x64/
          cp build/distribution/bin/example_01_window ogl-linux-musl-x64/
          cp build/distribution/bin/example_02_triangle ogl-linux-musl-x64/
          cp build/distribution/bin/example_03_texture ogl-linux-musl-x64/
          tar -czf ogl-linux-musl-x64.tar.gz ogl-linux-musl-x64

      - uses: actions/upload-artifact@v4
        with:
          name: ogl-linux-musl-x64.tar.gz
          path: ogl-linux-musl-x64.tar.gz

  release:
    needs: [build, build-musl]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Prepare nightly tag
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          gh release delete nightly --yes --cleanup-tag || true
          git tag -f nightly
          git push origin nightly --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release (stable)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ogl-linux-x64.tar.gz
            ogl-linux-musl-x64.tar.gz
            ogl-windows-x64.zip

      - name: Create release (nightly)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          prerelease: true
          name: Nightly Build
          body: |
            Automated nightly build from master branch.
            Commit: ${{ github.sha }}
          files: |
            ogl-linux-x64.tar.gz
            ogl-linux-musl-x64.tar.gz
            ogl-windows-x64.zip
