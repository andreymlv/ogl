name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  PROJECT_SOURCE_DIR: ${{ github.workspace }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux
          - os: windows-latest
            name: Windows

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang clazy ninja-build pkg-config \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libwayland-egl-backend-dev wayland-protocols libxkbcommon-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgl1-mesa-dri mesa-utils xvfb

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --yes

      - uses: lukka/get-cmake@latest

      - uses: lukka/run-vcpkg@v11

      - name: Configure
        run: cmake --preset Distribution

      - name: Build
        run: cmake --build --preset Distribution

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run ctest --preset Distribution
